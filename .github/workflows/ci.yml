name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package (with dev + viz extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
      - name: Run test suite (excluding slow benchmarks)
        run: pytest -m "not slow" --cov=trajectorycache --cov-report=term-missing

  lint:
    name: Lint & format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff black
      - name: ruff
        run: ruff check src tests
      - name: black --check
        run: black --check src tests
