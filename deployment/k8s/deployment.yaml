apiVersion: apps/v1
kind: Deployment
metadata:
  name: trajectorycache-api
  labels:
    app: trajectorycache
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trajectorycache
      component: api
  template:
    metadata:
      labels:
        app: trajectorycache
        component: api
    spec:
      containers:
        - name: api
          image: trajectorycache/trajectorycache:latest
          ports:
            - containerPort: 8000
          env:
            - name: TC_LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: trajectorycache-api-svc
spec:
  selector:
    app: trajectorycache
    component: api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
